name: Nightly Release

on:
  push:
    branches: [canary-server-workflow]
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Android Release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Configure Maven
        run: |
          mkdir -p ~/.m2
          echo "<settings><servers><server>
            <id>github</id>
            <username>github-actions[bot]</username>
            <password>${{ secrets.GITHUB_TOKEN }}</password>
          </server></servers></settings>" > ~/.m2/settings.xml

      - name: Build
        run: |
          mvn -ntp clean install
          mv apps/cli/target/cli-*.jar .

      - name: Build Android apps
        env:
          DDD_KEYFILE_PASSWORD: ${{ secrets.DDD_KEYFILE_PASSWORD }}
        run: |
          cd AndroidApps
          KEYFILE=${PWD}/signing-key.jks
          echo "${{ secrets.DDD_KEYFILE }}" | base64 -d > $KEYFILE
          ./gradlew clean bundleRelease assembleRelease \
            -Pandroid.injected.signing.store.file=$KEYFILE \
            -Pandroid.injected.signing.store.password=$DDD_KEYFILE_PASSWORD \
            -Pandroid.injected.signing.key.alias=ddd \
            -Pandroid.injected.signing.key.password=$DDD_KEYFILE_PASSWORD
          mv BundleClient/app/build/outputs/bundle/release/app-release.aab ../DDDClient.aab
          mv BundleClient/app/build/outputs/apk/release/app-release.apk ../DDDClient.apk
          mv BundleTransport/app/build/outputs/bundle/release/app-release.aab ../DDDTransport.aab
          mv BundleTransport/app/build/outputs/apk/release/app-release.apk ../DDDTransport.apk

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            DDDClient.aab
            DDDClient.apk
            DDDTransport.aab
            DDDTransport.apk

      - name: Upload CLI jar
        uses: actions/upload-artifact@v4
        with:
          name: cli-jar
          path: cli-*.jar
          if-no-files-found: error

  publish-nightly:
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-artifacts

      - name: Download CLI jar
        uses: actions/download-artifact@v4
        with:
          name: cli-jar

      - name: Save previous nightly CLI jar
        run: |
          gh release download nightly --pattern "cli-*.jar" --output old-cli.jar \
            --repo ${{ github.repository }} 2>/dev/null || true

      - name: Upload old CLI jar
        uses: actions/upload-artifact@v4
        with:
          name: old-cli-jar
          path: old-cli.jar
          if-no-files-found: ignore

      - name: Force-move nightly tag
        run: |
          git tag -f nightly ${{ github.sha }}
          git push -f https://x-access-token:${{ secrets.NIGHTLY_WORKFLOW_PAT }}@github.com/${{ github.repository }}.git refs/tags/nightly

      - name: Get date
        id: date
        run: echo "DATE=$(date -u '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly ${{ steps.date.outputs.DATE }}
          body: Nightly build from commit ${{ github.sha }}
          prerelease: true
          files: |
            DDDClient.aab
            DDDClient.apk
            DDDTransport.aab
            DDDTransport.apk
            cli-*.jar

  run-client-tests:
    needs: publish-nightly
    uses: ./.github/workflows/client-test.yml
    with:
      environment: production
    secrets: inherit

